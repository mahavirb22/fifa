name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Job 1: Backend Quality ----
  backend:
    name: Backend (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov mypy pydantic ruff

      - name: Lint (ruff check)
        run: ruff check app/ tests/

      - name: Format (ruff format --check)
        run: ruff format --check app/ tests/

      - name: Type check (mypy strict)
        run: mypy app/
        continue-on-error: true

      - name: Tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=90
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"
          GCP_PROJECT_ID: "test-project"

  # ---- Job 2: Frontend Quality ----
  frontend:
    name: Frontend (typecheck + lint + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642195f882660b323c62e7d # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint (ESLint + jsx-a11y accessibility rules)
        run: npm run lint

      - name: Format (Prettier --check)
        run: npm run format:check

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # ---- Job 3: E2E (on push only) ----
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642195f882660b323c62e7d # v4.4.0
        with:
          node-version: "20"

      - name: Install backend
        run: pip install -r backend/requirements.txt

      - name: Install frontend
        run: cd frontend && npm ci

      - name: Install Playwright
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          BASE_URL: http://localhost:8000

  # ---- Job 4: API Drift Detection ----
  api-drift:
    name: API Contract Drift
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install backend
        run: pip install -r backend/requirements.txt

      - name: Check OpenAPI schema is current
        run: |
          cd backend && python -c "
          from app.main import app
          import json
          schema = app.openapi()
          print(json.dumps(schema, indent=2))
          print('OpenAPI schema generated successfully')
          "
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"

